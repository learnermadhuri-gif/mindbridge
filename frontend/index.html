<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindBridge</title>
  <style>
    :root {
      --bg: #f7f5ff;
      --panel: #ffffff;
      --text: #2d2a32;
      --muted: #6b6570;
      --accent: #7c5cff;
      --accent-light: #ece8ff;
      --border: #e2ddf0;
      --radius: 16px;
      --font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      padding: 1rem 1.5rem;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    header h1 { margin: 0; font-size: 1.25rem; }
    header p { margin: 0; color: var(--muted); font-size: 0.875rem; }
    .logo {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--accent); color: white;
      display: grid; place-items: center; font-weight: 700;
    }
    main {
      flex: 1;
      overflow: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }
    .message {
      max-width: 85%;
      padding: 1rem;
      border-radius: var(--radius);
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .user { align-self: flex-end; background: var(--accent-light); }
    .agent { align-self: flex-start; background: var(--panel); border: 1px solid var(--border); }
    .typing { color: var(--muted); font-style: italic; }
    .input-area {
      padding: 1rem 1.5rem 2rem;
      background: var(--panel);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.75rem;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }
    textarea {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      font-family: inherit;
      font-size: 1rem;
      resize: none;
      min-height: 56px;
      max-height: 160px;
    }
    button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 0 1.25rem;
      font-size: 1rem;
      cursor: pointer;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .hint {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      padding: 0.5rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">M</div>
    <div>
      <h1>MindBridge</h1>
      <p>Cognitive accessibility concierge for neurodivergent users</p>
    </div>
  </header>
  <main id="chat"></main>
  <div class="input-area">
    <textarea id="message" rows="1" placeholder="e.g., I need to clean my apartment and I'm overwhelmed"></textarea>
    <button id="send" onclick="sendMessage()">Send</button>
  </div>
  <div class="hint">Built with Google ADK &middot; Individual submission &middot; Concierge Agents track</div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('message');
    const sendBtn = document.getElementById('send');

    function append(text, sender) {
      const div = document.createElement('div');
      div.className = `message ${sender}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      append(text, 'user');
      input.value = '';
      input.disabled = true;
      sendBtn.disabled = true;
      const typing = append('MindBridge is thinking...', 'agent typing');

      try {
        const res = await fetch('/run', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, session_id: null })
        });
        const data = await res.json();
        chat.removeChild(typing);
        append(data.response || '(no response)', 'agent');
      } catch (err) {
        chat.removeChild(typing);
        append('Error: ' + err.message, 'agent');
      } finally {
        input.disabled = false;
        sendBtn.disabled = false;
        input.focus();
      }
    }

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    append('Hi, I\'m MindBridge. I can help you break down overwhelming tasks, plan sensory-friendly outings, draft difficult messages, and manage your energy. What would you like support with today?', 'agent');
  </script>
</body>
</html>
